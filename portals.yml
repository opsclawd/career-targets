# Portal Scanner Configuration
# Used by career-ops scan to discover new offers automatically.
# Source of truth for job site targets - cloned by career-ops installations.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Senior Software Engineer keywords --
    - "Senior Software Engineer"
    - "Senior Software Developer"
    - "Staff Software Engineer"
    - "Principal Software Engineer"
    - "Lead Software Engineer"
    - "Software Engineer II"
    - "Software Engineer III"
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    # -- Platform/Infra roles --
    - "Platform Engineer"
    - "Infrastructure"
    - "Cloud Engineer"
    - "SRE"
    - "DevOps"
    # -- Architecture roles --
    - "Solutions Architect"
    - "Systems Architect"
    - "Technical Lead"
  negative:
    # -- Excluded keywords --
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:
  # -- LinkedIn --
  - name: LinkedIn — Senior SWE
    query: 'site:linkedin.com/jobs "Senior Software Engineer" OR "Staff Software Engineer" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Senior SWE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Software Engineer" remote'
    enabled: true

  - name: Greenhouse — AI/ML Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" AI OR ML OR LLM remote'
    enabled: true

  # -- Ashby --
  - name: Ashby — Senior SWE
    query: 'site:jobs.ashbyhq.com "Senior Software Engineer" OR "Staff Software Engineer" remote'
    enabled: true

  # -- Lever --
  - name: Lever — Senior SWE
    query: 'site:jobs.lever.co "Senior Software Engineer" OR "Staff Software Engineer" remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Senior SWE
    query: 'site:wellfound.com "Senior Software Engineer" OR "Staff Software Engineer" remote'
    enabled: true

  # -- Indeed --
  - name: Indeed — Senior SWE
    query: 'site:indeed.com "Senior Software Engineer" remote'
    enabled: true

  # -- Remote job boards --
  - name: WeWorkRemotely — Senior SWE
    query: 'site:weworkremotely.com "Senior Software Engineer" OR "Staff Software Engineer"'
    enabled: true

  - name: RemoteOK — Senior SWE
    query: 'site:remoteok.com "Senior Software Engineer" OR "Staff Software Engineer"'
    enabled: true

  - name: Remotive — Senior SWE
    query: 'site:remotive.com "Senior Software Engineer" OR "Staff Software Engineer"'
    enabled: true

